<!DOCTYPE html>
<html lang="en">

<head>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <style>

        @font-face {
    font-family: 'designerregular';
    src: url('font/designer-webfont.woff2') format('woff2'),
         url('font/designer-webfont.woff') format('woff');
    font-weight: normal;
    font-style: normal;

}
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            font-family: 'designerregular';
        }

        #difficulty-container {
            text-align: center;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        input[type="radio"] {
            display: none;
        }

        label {
            display: inline-block;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            color: #fff;
            background-color: #4CAF50;
            border-radius: 5px;
            margin: 0 10px;
            transition: background-color 0.3s;
        }

        input[type="radio"]:checked + label {
            background-color: #45a049;
        }

        #easy {
        background-color: #4CAF50;
    }

            #medium {
        background-color: #f0c516;
    }


            #hard {
        background-color: #f03416;
    }
        #start-btn {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
            background-color: #3498db;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            font-family: 'designerregular';
        }

        #start-btn:hover {
            background-color: #2980b9;
        }

#easy:active {
    transform: translate(0px,5px);
    -webkit-transform: translate(0px,5px);
    border-bottom: 1px solid;
    font-family: 'designerregular';
}

        #easy:hover {
            background-color: #418c44;
        }

        #medium:hover {
            background-color: #ccab25;
        }

        #hard:hover {
            background-color: #bf331d;
        }
#medium:active {
    transform: translate(0px,5px);
    -webkit-transform: translate(0px,5px);
    border-bottom: 1px solid;
    font-family: 'designerregular';
}
#hard:active {
    transform: translate(0px,5px);
    -webkit-transform: translate(0px,5px);
    border-bottom: 1px solid;
    font-family: 'designerregular';
}
#start-btn:active {
    transform: translate(0px,5px);
    -webkit-transform: translate(0px,5px);
    border-bottom: 1px solid;
    font-family: 'designerregular';
}
    </style>
</head>
<body>
    <div id="difficulty-container">
        <h2>Choisissez la difficulté :</h2>
        <input type="radio" id="easy" name="difficulty" value="1">
        <label id="easy" for="easy">Facile</label>

        <input type="radio" id="medium" name="difficulty" value="2">
        <label id="medium" for="medium">Intermédiaire</label>

        <input type="radio" id="hard" name="difficulty" value="3">
        <label id="hard" for="hard">Difficile</label>
        </a>
    </div>
</body>
</html>

<script>
    // Ajouter un gestionnaire d'événements pour les boutons radio
    document.querySelectorAll('input[type="radio"]').forEach(function(radio) {
        radio.addEventListener('click', function() {
            // Récupérer la valeur de l'option sélectionnée
            var selectedDifficulty = this.value;
            // Rediriger l'utilisateur vers la page sélectionnée
            window.location.href = "game.html?difficulty="+selectedDifficulty;
        });
    });
    </script>
